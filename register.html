<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - JOBIE</title>
    <link rel="icon" href="./assets/JOBIE.png" type="image/x-icon">
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">JOBIE</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html" class="active">Login/Register</a></li>
      </ul>
      <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
    </nav>

    <section class="form-section">
      <div class="form-card">
        <h2>Register</h2>
        <form onsubmit="registerUser(event)">
          <label>Full Name</label>
          <input type="text" id="regName" required />
          <label>Email</label>
          <input type="email" id="regEmail" required />
          <label>Password</label>
          <input type="password" id="regPassword" required />
          <button type="submit">Register</button>
        </form>
        <p class="form-footer">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
