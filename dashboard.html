<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - JOBIE</title>
  <link rel="icon" href="./assets/JOBIE.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">JOBIE</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="employer.html">Employer</a></li>
      <li><a href="#" onclick="logoutUser()">Logout</a></li>
    </ul>
    <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
  </nav>

  <section class="dashboard">
    <div class="welcome-card">
      <h2>Welcome, <span id="userName"></span>!</h2>
      <div class="cv-upload">
        <label>Upload CV:</label>
        <input type="file" id="cvFile" onchange="uploadCV()">
        <p id="cvStatus"></p>
      </div>
    </div>

    <h3>Available Jobs</h3>
    <div class="job-list" id="dashboardJobs"></div>

    <h3>Applied Jobs</h3>
    <div class="applied-list" id="appliedJobs"></div>
  </section>

  <script src="script.js"></script>
  <script>
    checkLogin();
    displayDashboardJobs();
    displayAppliedJobs();
    showCVStatus();
  </script>
</body>
</html>
